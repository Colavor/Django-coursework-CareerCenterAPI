{% extends 'vacancies/base.html' %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<h2>Регистрация студента</h2>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post">
  {% csrf_token %}
  <p>Логин: <input type="text" name="username" required></p>
  <p>Пароль: <input type="password" name="password" required></p>
  <p>Имя: <input type="text" name="first_name" required></p>
  <p>Фамилия: <input type="text" name="last_name" required></p>
  <p>Email: <input type="email" name="email" required></p>
  <p>Телефон: <input type="text" name="phone"></p>
  <p>Дата рождения: <input type="date" name="birth_date" required></p>
  <p>Курс: <input type="number" name="course" min="1" max="6" value="1"></p>
  <p>Специальность: <input type="text" name="specialty" required></p>
  <button type="submit">Зарегистрироваться</button>
</form>
{% endblock %}
